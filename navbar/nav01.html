<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav 01 - Portfolio Level</title>
    
    <!-- Bootstrap 5.1 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #0e0e0e;
            font-family: 'Syne', sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        
        /* navbar - classe obrigatória do Bootstrap para estrutura da barra de navegação */
        .navbar {
            background: #111118 !important;
            border-bottom: 2px solid #ff006e;
            box-shadow: 0 4px 20px rgba(255, 0, 110, 0.2);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }
        
        /* Efeito ao scroll - sombra dinâmica */
        .navbar.scrolled {
            box-shadow: 0 6px 30px rgba(255, 0, 110, 0.4);
            padding: 0.8rem 0;
        }
        
        /* navbar-brand - classe obrigatória do Bootstrap para logo/marca da aplicação */
        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .navbar-brand:hover {
            color: #ff006e !important;
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.8);
            transform: translateY(-2px);
        }
        
        .navbar-brand i {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .navbar-brand:hover i {
            transform: rotate(20deg) scale(1.1);
        }
        
        /* navbar-nav - classe obrigatória do Bootstrap para lista de itens de navegação */
        .navbar-nav {
            gap: 0.5rem;
        }
        
        /* nav-link - classe obrigatória do Bootstrap para links dentro da navbar */
        .nav-link {
            font-family: 'Space Mono', monospace;
            color: #b8b8b8 !important;
            font-size: 0.95rem;
            position: relative;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
        }
        
        .nav-link:hover {
            color: #00f5ff !important;
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
            background: rgba(0, 245, 255, 0.05);
            transform: translateY(-2px);
        }
        
        /* Underline animado nos links */
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff006e, #00f5ff);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        
        .nav-link:hover::after {
            width: 70%;
        }
        
        /* active - classe obrigatória do Bootstrap para indicar link da página atual */
        .nav-link.active {
            color: #ff006e !important;
            text-shadow: 0 0 15px rgba(255, 0, 110, 0.8);
            background: rgba(255, 0, 110, 0.08);
        }
        
        .nav-link.active::after {
            width: 70%;
            background: #ff006e;
            animation: activeGlow 2s ease-in-out infinite;
        }
        
        @keyframes activeGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 0, 110, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 0, 110, 0.8); }
        }
        
        /* Ícones com transição suave */
        .nav-link i {
            transition: transform 0.3s ease;
        }
        
        .nav-link:hover i {
            transform: scale(1.15);
        }
        
        /* navbar-toggler - classe obrigatória do Bootstrap para botão de menu responsivo */
        .navbar-toggler {
            border: 2px solid #ff006e;
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
        }
        
        .navbar-toggler:hover {
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.6);
            background: rgba(255, 0, 110, 0.05);
        }
        
        /* Rotação suave ao abrir menu */
        .navbar-toggler[aria-expanded="true"] {
            transform: rotate(90deg);
        }
        
        .navbar-toggler:focus {
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.8);
            outline: none;
        }
        
        /* navbar-toggler-icon - classe obrigatória do Bootstrap para ícone do menu hambúrguer */
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23ff006e' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
            transition: all 0.3s ease;
        }
        
        /* collapse navbar-collapse - classes obrigatórias do Bootstrap para menu colapsável responsivo */
        .navbar-collapse {
            transition: all 0.3s ease;
        }
        
        /* Animação suave ao abrir collapse */
        .navbar-collapse.collapsing {
            transition: height 0.35s ease;
        }
        
        .navbar-collapse.show {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .bi {
            margin-right: 0.5rem;
        }
        
        .content {
            padding: 4rem 2rem;
            text-align: center;
        }
        
        .content h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 3rem;
            background: linear-gradient(135deg, #ff006e, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .content p {
            font-family: 'Space Mono', monospace;
            color: #b8b8b8;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    
    <!-- navbar navbar-expand-lg - classes obrigatórias do Bootstrap -->
    <!-- navbar: estrutura principal da barra de navegação -->
    <!-- navbar-expand-lg: define que o menu expande em telas large (≥992px) -->
    <!-- navbar-dark: tema escuro para os componentes da navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            
            <!-- navbar-brand - classe obrigatória do Bootstrap para logo/marca -->
            <a class="navbar-brand" href="#">
                <i class="bi bi-lightning-charge-fill fs-4"></i>
                Y2K NAV
            </a>
            
            <!-- navbar-toggler - classe obrigatória do Bootstrap para botão hambúrguer -->
            <!-- data-bs-toggle="collapse" - atributo obrigatório que ativa o comportamento de collapse -->
            <!-- data-bs-target="#navbarNav01" - atributo obrigatório que define qual elemento será colapsado -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav01">
                <!-- navbar-toggler-icon - classe obrigatória do Bootstrap para ícone hambúrguer -->
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- collapse navbar-collapse - classes obrigatórias do Bootstrap para menu colapsável -->
            <!-- collapse: comportamento de colapsar/expandir -->
            <!-- navbar-collapse: estilização específica para collapse dentro da navbar -->
            <div class="collapse navbar-collapse" id="navbarNav01">
                
                <!-- navbar-nav - classe obrigatória do Bootstrap para lista de navegação -->
                <ul class="navbar-nav ms-auto">
                    
                    <!-- nav-link active - classes obrigatórias do Bootstrap -->
                    <!-- nav-link: estilização para links dentro da navbar -->
                    <!-- active: indica a página atual -->
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            <i class="bi bi-house-fill"></i>
                            Home
                        </a>
                    </li>
                    
                    <!-- nav-link - classe obrigatória do Bootstrap para links -->
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-info-circle-fill"></i>
                            Sobre
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-briefcase-fill"></i>
                            Portfólio
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-envelope-fill"></i>
                            Contato
                        </a>
                    </li>
                </ul>
                
            </div>
        </div>
    </nav>
    
    <div class="content">
        <h1>NAV 01</h1>
        <p>Navbar com micro interações profissionais e scroll dinâmico</p>
    </div>
    
    <!-- Bootstrap 5.1 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script para efeito de scroll dinâmico -->
    <script>
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
    
</body>
</html>
