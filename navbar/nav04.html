<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav 04 - Y2K Multi Dropdown</title>
    
    <!-- Bootstrap 5.1 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #0e0e0e;
            font-family: 'Syne', sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        
        /* navbar - classe obrigatória do Bootstrap para estrutura da barra de navegação */
        .navbar {
            background: linear-gradient(135deg, #111118, #1a1a24) !important;
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #ff006e, #00f5ff, #ff006e) 1;
            box-shadow: 0 4px 30px rgba(255, 0, 110, 0.2);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }
        
        .navbar.scrolled {
            box-shadow: 0 6px 40px rgba(255, 0, 110, 0.4);
            padding: 0.8rem 0;
        }
        
        /* navbar-brand - classe obrigatória do Bootstrap para logo/marca */
        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.6rem;
            color: #fff !important;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }
        
        .navbar-brand:hover {
            color: #00f5ff !important;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.8);
            transform: translateY(-2px) scale(1.05);
        }
        
        .navbar-brand i {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .navbar-brand:hover i {
            transform: rotate(360deg) scale(1.1);
        }
        
        /* navbar-text - classe obrigatória do Bootstrap para texto adicional na navbar */
        .navbar-text {
            font-family: 'Space Mono', monospace;
            color: #ff006e !important;
            font-size: 0.85rem;
            border: 1px solid #ff006e;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            margin-left: 1rem;
            background: rgba(255, 0, 110, 0.05);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 0, 110, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.8); }
        }
        
        /* navbar-nav - classe obrigatória do Bootstrap para lista de navegação */
        .navbar-nav {
            gap: 0.5rem;
        }
        
        /* nav-link - classe obrigatória do Bootstrap para links de navegação */
        .nav-link {
            font-family: 'Space Mono', monospace;
            color: #b8b8b8 !important;
            font-size: 0.95rem;
            position: relative;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
        }
        
        .nav-link:hover {
            color: #00f5ff !important;
            background: rgba(0, 245, 255, 0.05);
            text-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
            transform: translateY(-2px);
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f5ff, #ff006e);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        
        .nav-link:hover::after {
            width: 70%;
        }
        
        /* active - classe obrigatória do Bootstrap para indicar página atual */
        .nav-link.active {
            color: #ff006e !important;
            background: rgba(255, 0, 110, 0.1);
            text-shadow: 0 0 15px rgba(255, 0, 110, 0.8);
        }
        
        .nav-link.active::after {
            width: 70%;
            background: #ff006e;
            animation: activeGlow 2s ease-in-out infinite;
        }
        
        @keyframes activeGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 0, 110, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 0, 110, 0.8); }
        }
        
        .nav-link i {
            transition: transform 0.3s ease;
        }
        
        .nav-link:hover i {
            transform: scale(1.15);
        }
        
        /* dropdown-toggle - classe obrigatória do Bootstrap para botão dropdown */
        .dropdown-toggle::after {
            margin-left: 0.5rem;
            transition: transform 0.3s ease;
        }
        
        .dropdown.show .dropdown-toggle::after {
            transform: rotate(180deg);
        }
        
        /* dropdown-menu - classe obrigatória do Bootstrap para menu suspenso */
        .dropdown-menu {
            background: #1a1a24;
            border: 2px solid #00f5ff;
            box-shadow: 0 8px 30px rgba(0, 245, 255, 0.4);
            margin-top: 0.5rem !important;
            border-radius: 12px;
            padding: 0.5rem;
            animation: dropdownSlide 0.3s ease;
        }
        
        @keyframes dropdownSlide {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* dropdown-item - classe obrigatória do Bootstrap para itens do dropdown */
        .dropdown-item {
            font-family: 'Space Mono', monospace;
            color: #b8b8b8 !important;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border-radius: 8px;
            margin: 0.2rem 0;
            position: relative;
            overflow: hidden;
        }
        
        .dropdown-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 0;
            background: #00f5ff;
            transition: height 0.3s ease;
        }
        
        .dropdown-item:hover::before {
            height: 100%;
        }
        
        .dropdown-item:hover {
            background: rgba(0, 245, 255, 0.1);
            color: #00f5ff !important;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.6);
            transform: translateX(8px);
            padding-left: 2rem;
        }
        
        .dropdown-item i {
            transition: transform 0.3s ease;
        }
        
        .dropdown-item:hover i {
            transform: scale(1.2);
        }
        
        .dropdown-divider {
            border-color: rgba(0, 245, 255, 0.3);
            margin: 0.5rem 1rem;
        }
        
        /* navbar-toggler - classe obrigatória do Bootstrap para botão responsivo */
        .navbar-toggler {
            border: 2px solid #00f5ff;
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
        }
        
        .navbar-toggler:hover {
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
            background: rgba(0, 245, 255, 0.05);
        }
        
        .navbar-toggler[aria-expanded="true"] {
            transform: rotate(90deg);
        }
        
        .navbar-toggler:focus {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.8);
            outline: none;
        }
        
        /* navbar-toggler-icon - classe obrigatória do Bootstrap para ícone hambúrguer */
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%2300f5ff' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        
        /* collapse navbar-collapse - classes obrigatórias do Bootstrap */
        .navbar-collapse {
            transition: all 0.3s ease;
        }
        
        .navbar-collapse.collapsing {
            transition: height 0.35s ease;
        }
        
        .navbar-collapse.show {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .bi {
            margin-right: 0.5rem;
        }
        
        .content {
            padding: 4rem 2rem;
            text-align: center;
        }
        
        .content h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 3rem;
            background: linear-gradient(135deg, #00f5ff, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .content p {
            font-family: 'Space Mono', monospace;
            color: #b8b8b8;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    
    <!-- navbar navbar-expand-xl - classes obrigatórias -->
    <!-- navbar-expand-xl: breakpoint extra large -->
    <nav class="navbar navbar-expand-xl navbar-dark">
        <div class="container-fluid">
            
            <!-- navbar-brand - classe obrigatória -->
            <a class="navbar-brand" href="#">
                <i class="bi bi-cpu-fill fs-3"></i>
                NEXUS
            </a>
            
            <!-- navbar-text - classe obrigatória -->
            <span class="navbar-text d-none d-lg-block">
                <i class="bi bi-lightning-charge-fill"></i>
                PRO
            </span>
            
            <!-- navbar-toggler - classe obrigatória -->
            <!-- data-bs-toggle e data-bs-target - atributos obrigatórios -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav04">
                <!-- navbar-toggler-icon - classe obrigatória -->
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- collapse navbar-collapse - classes obrigatórias -->
            <div class="collapse navbar-collapse" id="navbarNav04">
                
                <!-- navbar-nav - classe obrigatória -->
                <ul class="navbar-nav ms-auto">
                    
                    <!-- nav-link active - classes obrigatórias -->
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            <i class="bi bi-house-door-fill fs-5"></i>
                            Home
                        </a>
                    </li>
                    
                    <!-- dropdown - classe obrigatória -->
                    <li class="nav-item dropdown">
                        <!-- dropdown-toggle - classe obrigatória -->
                        <!-- data-bs-toggle - atributo obrigatório -->
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-grid-3x3-gap-fill fs-5"></i>
                            Produtos
                        </a>
                        <!-- dropdown-menu - classe obrigatória -->
                        <ul class="dropdown-menu">
                            <!-- dropdown-item - classe obrigatória -->
                            <li><a class="dropdown-item" href="#"><i class="bi bi-laptop"></i> Notebooks</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-phone"></i> Smartphones</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-headset"></i> Acessórios</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-star-fill text-warning"></i> Lançamentos</a></li>
                        </ul>
                    </li>
                    
                    <!-- dropdown - classe obrigatória -->
                    <li class="nav-item dropdown">
                        <!-- dropdown-toggle - classe obrigatória -->
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-tools fs-5"></i>
                            Soluções
                        </a>
                        <!-- dropdown-menu - classe obrigatória -->
                        <ul class="dropdown-menu">
                            <!-- dropdown-item - classe obrigatória -->
                            <li><a class="dropdown-item" href="#"><i class="bi bi-cloud-arrow-up"></i> Cloud Storage</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-shield-check"></i> Segurança</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-graph-up-arrow"></i> Analytics</a></li>
                        </ul>
                    </li>
                    
                    <!-- nav-link - classe obrigatória -->
                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            <i class="bi bi-newspaper fs-5"></i>
                            Blog
                        </a>
                    </li>
                    
                    <!-- dropdown - classe obrigatória -->
                    <li class="nav-item dropdown">
                        <!-- dropdown-toggle - classe obrigatória -->
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                            Conta
                        </a>
                        <!-- dropdown-menu - classe obrigatória -->
                        <ul class="dropdown-menu">
                            <!-- dropdown-item - classe obrigatória -->
                            <li><a class="dropdown-item" href="#"><i class="bi bi-box-arrow-in-right"></i> Login</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-person-plus"></i> Cadastrar</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear"></i> Configurações</a></li>
                        </ul>
                    </li>
                </ul>
                
            </div>
        </div>
    </nav>
    
    <div class="content">
        <h1>NAV 04</h1>
        <p>Navbar com múltiplos dropdowns e navbar-text animado</p>
    </div>
    
    <!-- Bootstrap 5.1 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
    
</body>
</html>
