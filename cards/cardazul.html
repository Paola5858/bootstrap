<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cardazul</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    body { background-color: #0e0e0e; font-family: 'Syne', sans-serif; padding: 3rem 0; }
    .card {
      border: none;
      border-radius: 8px;
      overflow: hidden;
    }
    .card.bg-primary {
      background: linear-gradient(145deg, #0040ff, #0020aa) !important;
      border: 1px solid rgba(0,100,255,0.4);
    }
    .card-title { font-weight: 800; font-size: 1.1rem; }
    .card-subtitle { font-family: 'Space Mono', monospace; font-size: 0.7rem; opacity: 0.7; margin-bottom: 0.8rem; }
    .card-text { font-family: 'Space Mono', monospace; font-size: 0.75rem; opacity: 0.75; line-height: 1.8; }
    .btn-outline-light {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card col-4 text-white bg-primary">
      <img src="https://picsum.photos/400/250?random=20" class="card-img-top" alt="imagem"/>
      <div class="card-body">
        <h5 class="card-title">Título do Card</h5>
        <h6 class="card-subtitle">Subtítulo</h6>
        <p class="card-text">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Architecto, sit.</p>
        <a href="#" class="btn btn-outline-light">Acessar!</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
