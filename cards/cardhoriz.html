<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cardhoriz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    body { background-color: #0e0e0e; font-family: 'Syne', sans-serif; padding: 3rem 0; }
    .card {
      background-color: #1a0a1e;
      border: 1px solid rgba(0,245,212,0.2);
      border-radius: 10px;
      color: #f0f0f0;
      overflow: hidden;
    }
    .card-title { font-weight: 800; font-size: 1.05rem; color: #00f5d4; }
    .card-text { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: rgba(240,240,240,0.5); line-height: 1.8; }
    .text-muted { color: rgba(240,240,240,0.3) !important; font-family: 'Space Mono', monospace; font-size: 0.65rem; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card mb-3 col-5">
      <div class="row g-0">
        <div class="col-md-4">
          <img src="https://picsum.photos/200/200?random=30" class="img-fluid rounded-start h-100" alt="imagem" style="object-fit:cover;"/>
        </div>
        <div class="col-md-8">
          <div class="card-body">
            <h5 class="card-title">Título do Card</h5>
            <p class="card-text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Laboriosam, magni!</p>
            <p class="card-text"><small class="text-muted">// última atualização agora</small></p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
