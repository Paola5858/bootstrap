<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cards01</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    body { background-color: #0e0e0e; font-family: 'Syne', sans-serif; padding: 3rem 0; }
    .card {
      background-color: #1a0a1e;
      border: 1px solid rgba(255,45,120,0.25);
      border-radius: 8px;
      color: #f0f0f0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeIn 0.6s ease;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 12px 40px rgba(255,45,120,0.3); }
    .card-header {
      background-color: rgba(255,45,120,0.12);
      border-bottom: 1px solid rgba(255,45,120,0.2);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff2d78;
    }
    .card-title { font-weight: 800; font-size: 1.2rem; color: #f0f0f0; letter-spacing: -0.02em; }
    .card-subtitle { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: rgba(240,240,240,0.45); margin-bottom: 1rem; }
    .card-text { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: rgba(240,240,240,0.5); line-height: 1.9; }
    .btn-custom {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: #ff2d78;
      color: #fff;
      border: none;
      border-radius: 2px;
      padding: 0.5rem 1.4rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-custom:hover { background: #d4205f; color: #fff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,45,120,0.4); }
    .list-group-item {
      background-color: rgba(255,255,255,0.03);
      border-color: rgba(255,45,120,0.1);
      color: rgba(240,240,240,0.55);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 0.85rem 1.25rem;
    }
    .card-footer {
      background-color: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,45,120,0.1);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: rgba(240,240,240,0.3);
      letter-spacing: 0.15em;
      padding: 0.85rem 1.25rem;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&h=250&fit=crop" class="card-img-top" alt="imagem do card"/>
      <div class="card-header">// card 01</div>
      <div class="card-body">
        <h5 class="card-title">Título do Card</h5>
        <h6 class="card-subtitle">Subtítulo</h6>
        <p class="card-text">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Architecto, sit.</p>
        <a href="#" class="btn-custom btn">Acessar!</a>
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">✦ Item 1</li>
        <li class="list-group-item">✦ Item 2</li>
        <li class="list-group-item">✦ Item 3</li>
      </ul>
      <div class="card-footer">atualizado agora mesmo</div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
