<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cards01</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    body { background-color: #0e0e0e; font-family: 'Syne', sans-serif; padding: 3rem 0; }
    .card {
      background-color: #1a0a1e;
      border: 1px solid rgba(255,45,120,0.25);
      border-radius: 8px;
      color: #f0f0f0;
    }
    .card-header {
      background-color: rgba(255,45,120,0.12);
      border-bottom: 1px solid rgba(255,45,120,0.2);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff2d78;
    }
    .card-title { font-weight: 800; font-size: 1.1rem; color: #f0f0f0; }
    .card-subtitle { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: rgba(240,240,240,0.45); margin-bottom: 0.8rem; }
    .card-text { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: rgba(240,240,240,0.5); line-height: 1.8; }
    .btn-custom {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: #ff2d78;
      color: #fff;
      border: none;
      border-radius: 2px;
      padding: 0.45rem 1.2rem;
    }
    .btn-custom:hover { background: #d4205f; color: #fff; }
    .list-group-item {
      background-color: rgba(255,255,255,0.03);
      border-color: rgba(255,45,120,0.1);
      color: rgba(240,240,240,0.55);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
    }
    .card-footer {
      background-color: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,45,120,0.1);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: rgba(240,240,240,0.3);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card col-4">
      <img src="https://picsum.photos/400/250?random=10" class="card-img-top" alt="imagem do card"/>
      <div class="card-header">// card 01</div>
      <div class="card-body">
        <h5 class="card-title">Título do Card</h5>
        <h6 class="card-subtitle">Subtítulo</h6>
        <p class="card-text">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Architecto, sit.</p>
        <a href="#" class="btn-custom btn">Acessar!</a>
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">✦ Item 1</li>
        <li class="list-group-item">✦ Item 2</li>
        <li class="list-group-item">✦ Item 3</li>
      </ul>
      <div class="card-footer">atualizado agora mesmo</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
