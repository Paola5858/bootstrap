<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>cardexerc01</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
  <style>
    body { background-color: #0e0e0e; font-family: 'Syne', sans-serif; padding: 3rem 0; }
    .card {
      background-color: #1a0a1e;
      border: 1px solid rgba(255,45,120,0.2);
      border-radius: 10px;
      color: #f0f0f0;
      overflow: hidden;
    }
    .card-img-top { object-fit: cover; height: 220px; }
    .card-body { padding: 1.2rem 1.4rem 1rem; }
    .card-title { font-weight: 800; font-size: 1.05rem; margin-bottom: 0.1rem; }
    .card-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: rgba(240,240,240,0.4);
      margin-bottom: 1rem;
    }
    .social-icons a {
      color: rgba(240,240,240,0.5);
      font-size: 1.2rem;
      margin-right: 0.6rem;
      transition: color 0.2s;
      text-decoration: none;
    }
    .social-icons a:hover { color: #ff2d78; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card col-3">
      <!-- Troque o src abaixo pela URL da sua foto se quiser -->
      <img src="https://picsum.photos/300/220?random=99" class="card-img-top" alt="foto de perfil"/>
      <div class="card-body">
        <h5 class="card-title">Paola</h5>
        <h6 class="card-subtitle">Dev em formação · SENAI</h6>
        <div class="social-icons">
          <a href="#"><i class="bi bi-facebook"></i></a>
          <a href="#"><i class="bi bi-twitter"></i></a>
          <a href="#"><i class="bi bi-linkedin"></i></a>
          <a href="#"><i class="bi bi-instagram"></i></a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
